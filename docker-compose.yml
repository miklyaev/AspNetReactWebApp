version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: jira_clone_db
    restart: always
    environment:
      POSTGRES_DB: TestDb
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jira_clone_web
    restart: always
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=TestAiNvkzDb;Username=test;Password=test_password
    depends_on:
      - db

volumes:
  postgres_data:
