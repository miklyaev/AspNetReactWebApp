version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: aspnet-react-db
    restart: always
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: 130469
      POSTGRES_DB: TestAiNvkzDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aspnet-react-app
    restart: always
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Database=mydatabase;Username=myuser;Password=mypassword
    depends_on:
      - db

volumes:
  postgres_data:
